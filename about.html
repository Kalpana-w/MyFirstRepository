<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalpana's Profile</title>
    
    <!-- CSS for styling -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #4a90e2;
        }
        .highlight {
            color: #e91e63;
            font-weight: bold;
        }
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome to My Website</h1>
        <p>This is my second page 🚀</p>
        <p>Hello! My name is <span class="highlight">Kalpana</span>.</p>
        
        <!-- Ek simple button function ke sath -->
        <button onclick="sayHello()">Click Me!</button>
    </div>

    <!-- JavaScript for interactivity -->
    <script>
        function sayHello() {
            alert("Hi Kalpana! Hope you're having a great day!");
        }
    </script>

</body>
</html>
